<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConceptForge • R400 Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; }
        .cosmic-bg { background: radial-gradient(circle at 50% 30%, #0a0a1f 0%, #000000 70%); }
        .neon-text { text-shadow: 0 0 10px #00f9ff, 0 0 20px #00f9ff; }
        .concept-label { position: absolute; background: rgba(10, 10, 31, 0.85); border: 1px solid #00f9ff; color: white; padding: 4px 12px; border-radius: 9999px; font-size: 13px; font-weight: 600; pointer-events: none; white-space: nowrap; box-shadow: 0 0 15px rgba(0, 249, 255, 0.5); transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1); z-index: 50; }
        .concept-label.active { background: #00f9ff; color: #000; box-shadow: 0 0 30px #00f9ff; transform: scale(1.15); }
        .three-container { filter: contrast(1.1) saturate(1.2); }
    </style>
</head>
<body class="bg-black text-white overflow-hidden cosmic-bg">
    <div class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-lg border-b border-white/10">
        <div class="max-w-screen-2xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-500 flex items-center justify-center">
                        <span class="text-black text-2xl font-bold">C</span>
                    </div>
                    <div>
                        <div class="font-display text-2xl font-semibold tracking-tighter">ConceptForge</div>
                        <div class="text-[10px] text-white/50 -mt-1">R400 POWERED</div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-x-3">
                <div id="mode-indicator" class="px-4 py-1.5 rounded-3xl bg-white/5 text-sm flex items-center gap-x-2 border border-white/10">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span id="mode-text" class="font-medium">FREE EXPLORE</span>
                </div>
                <button onclick="toggleFullscreen()" class="px-4 py-2 rounded-3xl bg-white/5 hover:bg-white/10 border border-white/10 flex items-center gap-x-2 text-sm transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                    <span class="hidden md:inline">Fullscreen</span>
                </button>
                <button onclick="showEditModal()" class="px-5 py-2 rounded-3xl bg-white/5 hover:bg-white/10 border border-white/10 flex items-center gap-x-2 text-sm font-medium transition-all">
                    <span>⚙️</span> <span>Edit Concepts</span>
                </button>
            </div>
        </div>
    </div>

    <div class="flex h-screen pt-16">
        <div class="flex-1 relative">
            <div id="three-container" class="three-container w-full h-full"></div>
            <div id="labels-container" class="absolute inset-0 pointer-events-none"></div>

            <div class="absolute bottom-6 left-6 bg-black/60 backdrop-blur px-5 py-3 rounded-3xl border border-white/10 text-xs max-w-[260px]">
                <div class="flex items-center gap-x-2 mb-1.5"><div class="px-2 py-0.5 bg-white/10 rounded text-[10px] font-mono">R400</div><span class="text-white/70">Use your presenter remote</span></div>
                <div class="space-y-1 text-white/60 text-[11px]">
                    <div>Forward / Back → Page↓ / Page↑</div>
                    <div>Play / Tour → F5 / Esc</div>
                    <div>Immersion → . (period)</div>
                </div>
            </div>

            <div class="absolute top-6 right-6 bg-black/70 backdrop-blur-xl border border-white/10 rounded-3xl px-5 py-4 w-72">
                <div class="flex items-center justify-between mb-3">
                    <div class="text-xs uppercase tracking-[2px] text-white/50">NOW EXPLORING</div>
                    <div id="concept-counter" class="text-xs font-mono bg-white/10 px-2.5 py-px rounded">01 / 08</div>
                </div>
                <div id="current-concept-name" class="font-display text-3xl font-semibold tracking-tighter text-white neon-text"></div>
                <div id="current-concept-desc" class="text-sm text-white/70 mt-1.5 leading-snug line-clamp-3"></div>
            </div>
        </div>

        <div class="w-96 border-l border-white/10 bg-black/80 backdrop-blur-xl flex flex-col">
            <div class="p-8 flex-1 overflow-auto">
                <div class="mb-8">
                    <div class="uppercase text-xs tracking-[3px] text-white/40 mb-1">CONNECTIONS</div>
                    <div id="connections-list" class="space-y-2 mt-3"></div>
                </div>
                <div>
                    <div class="uppercase text-xs tracking-[3px] text-white/40 mb-3">KEY INSIGHT</div>
                    <div id="insight-text" class="text-white/90 leading-relaxed text-[15px]"></div>
                </div>
            </div>
            <div class="p-6 border-t border-white/10 bg-black/60">
                <div class="flex items-center justify-between text-xs">
                    <span class="text-white/50">Press <span class="font-mono">.</span> for immersion</span>
                    <button onclick="resetCamera()" class="text-xs px-3 py-1 rounded-2xl border border-white/20 hover:bg-white/5 transition-colors">RESET VIEW</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6">
        <div class="bg-zinc-950 border border-white/10 rounded-3xl w-full max-w-2xl">
            <div class="px-8 py-6 border-b border-white/10 flex justify-between items-center">
                <div><div class="font-semibold text-xl">Edit Concepts (JSON)</div><div class="text-xs text-white/50">Changes apply instantly</div></div>
                <button onclick="hideEditModal()" class="text-white/60 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            <div class="p-8"><textarea id="json-editor" class="w-full h-80 bg-black border border-white/20 rounded-2xl p-6 font-mono text-sm text-emerald-400 focus:outline-none focus:border-cyan-400" spellcheck="false"></textarea></div>
            <div class="px-8 py-5 border-t border-white/10 flex justify-end gap-x-3">
                <button onclick="hideEditModal()" class="px-6 py-2.5 rounded-3xl border border-white/20 text-sm">Cancel</button>
                <button onclick="applyConceptChanges()" class="px-8 py-2.5 rounded-3xl bg-white text-black font-semibold text-sm">Apply & Reload</button>
            </div>
        </div>
    </div>

    <script>
        let concepts = [ { "id": 1, "name": "Curiosity", "desc": "The fundamental driver of all discovery and understanding.", "insight": "Without curiosity, intelligence is just pattern matching. It is the spark that turns data into wisdom.", "connections": [2,3,4,8], "color": "#00f9ff", "position": { "x": 0, "y": 0, "z": 0 } }, { "id": 2, "name": "Large Language Models", "desc": "Massive neural networks trained on vast human knowledge.", "insight": "They don't think — they predict the next token. Yet emergence turns prediction into reasoning.", "connections": [1,3,5], "color": "#a78bfa", "position": { "x": 8, "y": 3, "z": -2 } }, { "id": 3, "name": "Attention Mechanisms", "desc": "The secret sauce that lets models focus on what matters.", "insight": "Scaled dot-product attention changed everything. It is the reason transformers work at all.", "connections": [1,2,4,6], "color": "#f472b6", "position": { "x": -7, "y": 4, "z": 5 } }, { "id": 4, "name": "Reinforcement Learning", "desc": "Learning through trial, error, and reward.", "insight": "The path to agency. From games to real-world decision making.", "connections": [1,3,7], "color": "#4ade80", "position": { "x": 5, "y": -6, "z": 8 } }, { "id": 5, "name": "Multimodal AI", "desc": "Understanding text, images, audio, and video together.", "insight": "The next leap: models that see, hear, and speak as fluently as they reason.", "connections": [2,6], "color": "#fb923c", "position": { "x": -9, "y": -2, "z": -6 } }, { "id": 6, "name": "Emergent Abilities", "desc": "Capabilities that appear suddenly at scale.", "insight": "Bigger isn't just better — it's qualitatively different. Phase transitions in intelligence.", "connections": [2,3,5,8], "color": "#e879f9", "position": { "x": 3, "y": 7, "z": -9 } }, { "id": 7, "name": "Alignment & Safety", "desc": "Ensuring AI systems remain helpful, honest, and harmless.", "insight": "The hardest and most important problem in AI. We must solve it before superintelligence arrives.", "connections": [4,8], "color": "#f87171", "position": { "x": -4, "y": -8, "z": 2 } }, { "id": 8, "name": "Truth-Seeking", "desc": "The north star of understanding the universe.", "insight": "Grok's core mission: seek truth, be maximally helpful, and never shy away from reality.", "connections": [1,6,7], "color": "#67e8f9", "position": { "x": 0, "y": 9, "z": -4 } } ];
        let currentIndex = 0, isAutoTour = false, tourInterval = null, isImmersion = false, scene, camera, renderer, conceptMeshes = [], connectionLines = [], labelElements = [], raycaster, mouse;

        function initThreeJS() {
            const container = document.getElementById('three-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(65, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 12, 22); camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x222244, 0.6));
            const p1 = new THREE.PointLight(0x00f9ff, 1.2, 100); p1.position.set(15, 25, 10); scene.add(p1);
            const p2 = new THREE.PointLight(0xa78bfa, 0.9, 100); p2.position.set(-20, -10, -15); scene.add(p2);

            const starsGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(2800 * 3);
            for (let i = 0; i < 8400; i += 3) { pos[i] = (Math.random()-0.5)*180; pos[i+1] = (Math.random()-0.5)*180; pos[i+2] = (Math.random()-0.5)*180; }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.15, transparent: true, opacity: 0.7 })));

            raycaster = new THREE.Raycaster(); mouse = new THREE.Vector2();
            createConceptNodes(); createConnections();

            window.addEventListener('resize', () => { camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); });

            function animate() { requestAnimationFrame(animate); scene.rotation.y += 0.0008; updateLabels(); renderer.render(scene, camera); }
            animate();
            setTimeout(() => focusOnConcept(0), 800);
        }

        function createConceptNodes() {
            conceptMeshes = []; labelElements = [];
            const labelsContainer = document.getElementById('labels-container'); labelsContainer.innerHTML = '';
            concepts.forEach((concept, index) => {
                const geo = new THREE.SphereGeometry(1.8, 48, 48);
                const mat = new THREE.MeshPhongMaterial({ color: concept.color, emissive: concept.color, emissiveIntensity: 0.35, shininess: 90, transparent: true, opacity: 0.95 });
                const mesh = new THREE.Mesh(geo, mat);
                if (concept.position) mesh.position.set(concept.position.x, concept.position.y, concept.position.z);
                else {
                    const phi = Math.acos(-1 + (2 * index) / concepts.length);
                    const theta = Math.sqrt(concepts.length * Math.PI) * phi;
                    mesh.position.set(14 * Math.cos(theta) * Math.sin(phi), 14 * Math.sin(theta) * Math.sin(phi) + (index % 3 - 1) * 2, 14 * Math.cos(phi));
                }
                mesh.userData = { conceptId: concept.id, index };
                scene.add(mesh); conceptMeshes.push(mesh);

                const ring = new THREE.Mesh(new THREE.RingGeometry(2.4, 2.7, 64), new THREE.MeshBasicMaterial({ color: concept.color, side: THREE.DoubleSide, transparent: true, opacity: 0.25 }));
                ring.rotation.x = Math.PI / 2; mesh.add(ring);

                const label = document.createElement('div');
                label.className = 'concept-label px-4 py-1 text-sm font-semibold';
                label.style.borderColor = concept.color;
                label.innerHTML = `<span style="color:${concept.color}">●</span> ${concept.name}`;
                labelsContainer.appendChild(label);
                labelElements.push(label);
            });
        }

        function createConnections() {
            connectionLines = [];
            concepts.forEach((concept, i) => {
                concept.connections.forEach(connId => {
                    const targetIndex = concepts.findIndex(c => c.id === connId);
                    if (targetIndex === -1 || targetIndex <= i) return;
                    const points = [conceptMeshes[i].position, conceptMeshes[targetIndex].position];
                    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.45 }));
                    scene.add(line);
                    connectionLines.push({ line, startMesh: conceptMeshes[i], endMesh: conceptMeshes[targetIndex] });
                });
            });
        }

        function updateLabels() {
            const container = document.getElementById('three-container');
            const rect = container.getBoundingClientRect();
            conceptMeshes.forEach((mesh, i) => {
                if (!labelElements[i]) return;
                const label = labelElements[i];
                const vector = mesh.position.clone(); vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * rect.width;
                const y = (-vector.y * 0.5 + 0.5) * rect.height;
                label.style.left = `${x}px`; label.style.top = `${y}px`; label.style.transform = 'translate(-50%, -50%)';
                const isVisible = vector.z < 1 && mesh.position.distanceTo(camera.position) < 45;
                label.style.opacity = isVisible ? (mesh.userData.index === currentIndex ? '1' : '0.75') : '0';
                if (mesh.userData.index === currentIndex) label.classList.add('active'); else label.classList.remove('active');
            });
        }

        function focusOnConcept(index) {
            currentIndex = index % concepts.length;
            const concept = concepts[currentIndex];
            const mesh = conceptMeshes[currentIndex];

            document.getElementById('current-concept-name').innerHTML = concept.name;
            document.getElementById('current-concept-desc').innerHTML = concept.desc;
            document.getElementById('concept-counter').innerHTML = `${String(currentIndex + 1).padStart(2, '0')} / ${String(concepts.length).padStart(2, '0')}`;
            document.getElementById('insight-text').innerHTML = concept.insight;

            const connList = document.getElementById('connections-list'); connList.innerHTML = '';
            concept.connections.forEach(connId => {
                const connConcept = concepts.find(c => c.id === connId);
                if (!connConcept) return;
                const div = document.createElement('div');
                div.className = `flex items-center justify-between px-4 py-3 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition-colors border border-white/10`;
                div.innerHTML = `<div class="flex items-center gap-x-3"><div class="w-3 h-3 rounded-full" style="background:${connConcept.color}"></div><span class="font-medium">${connConcept.name}</span></div><span class="text-xs text-white/50">→</span>`;
                div.onclick = () => focusOnConcept(concepts.findIndex(c => c.id === connId));
                connList.appendChild(div);
            });

            const targetPos = mesh.position.clone();
            const newCamPos = targetPos.clone().add(new THREE.Vector3(0, 6, 14));
            const startPos = camera.position.clone();
            const duration = 1200; const startTime = Date.now();
            function animateCamera() {
                const t = Math.min((Date.now() - startTime) / duration, 1);
                const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                camera.position.lerpVectors(startPos, newCamPos, eased);
                camera.lookAt(targetPos);
                if (t < 1) requestAnimationFrame(animateCamera);
            }
            animateCamera();

            conceptMeshes.forEach((m, i) => { if (i === currentIndex) { m.scale.set(1.25,1.25,1.25); m.material.emissiveIntensity = 0.9; } else { m.scale.set(1,1,1); m.material.emissiveIntensity = 0.35; } });
            connectionLines.forEach(l => { if (l.startMesh === mesh || l.endMesh === mesh) { l.line.material.opacity = 0.95; l.line.material.color.setHex(0x00f9ff); setTimeout(() => { if(l.line){l.line.material.opacity=0.45; l.line.material.color.setHex(0x334455);} }, 650); } });
        }

        function nextConcept() { focusOnConcept(currentIndex + 1); if (isImmersion) createBurst(); }
        function prevConcept() { focusOnConcept(currentIndex - 1); }
        function toggleAutoTour() {
            isAutoTour = !isAutoTour;
            const ind = document.getElementById('mode-text');
            if (isAutoTour) { ind.innerHTML = 'AUTO TOUR ▶'; ind.style.color = '#4ade80'; if (tourInterval) clearInterval(tourInterval); tourInterval = setInterval(nextConcept, 4200); }
            else { ind.innerHTML = 'FREE EXPLORE'; ind.style.color = ''; if (tourInterval) { clearInterval(tourInterval); tourInterval = null; } }
        }
        function toggleImmersion() {
            isImmersion = !isImmersion;
            const sidebar = document.querySelector('.w-96'); const hud = document.querySelector('.absolute.top-6.right-6');
            if (isImmersion) { sidebar.style.transform = 'translateX(100%)'; hud.style.opacity = '0.15'; document.getElementById('mode-text').innerHTML = 'IMMERSION'; document.getElementById('mode-text').style.color = '#e879f9'; conceptMeshes.forEach(m => m.material.emissiveIntensity = 0.75); createBurst(3); }
            else { sidebar.style.transform = 'translateX(0)'; hud.style.opacity = '1'; document.getElementById('mode-text').innerHTML = isAutoTour ? 'AUTO TOUR ▶' : 'FREE EXPLORE'; document.getElementById('mode-text').style.color = ''; conceptMeshes.forEach(m => m.material.emissiveIntensity = 0.35); }
        }
        function createBurst(count = 1) {
            for (let c = 0; c < count; c++) {
                setTimeout(() => {
                    const burst = new THREE.Group(); scene.add(burst);
                    for (let i = 0; i < 28; i++) {
                        const p = new THREE.Mesh(new THREE.SphereGeometry(Math.random()*0.6+0.3,6,6), new THREE.MeshBasicMaterial({ color: concepts[currentIndex].color, transparent: true, opacity: 0.9 }));
                        const dir = new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2).normalize();
                        p.position.copy(conceptMeshes[currentIndex].position);
                        p.userData = { vel: dir.multiplyScalar(0.8 + Math.random()*0.6), life: 38 + Math.random()*22 };
                        burst.add(p);
                    }
                    let life = 60;
                    const int = setInterval(() => {
                        life--; burst.children.forEach(p => { p.position.add(p.userData.vel); p.userData.vel.multiplyScalar(0.96); p.material.opacity *= 0.94; p.scale.multiplyScalar(0.985); });
                        if (life <= 0) { scene.remove(burst); clearInterval(int); }
                    }, 16);
                }, c * 80);
            }
        }
        function resetCamera() {
            const startPos = camera.position.clone(); const newPos = new THREE.Vector3(0,12,22); const duration = 1400; const startTime = Date.now();
            function anim() { const t = Math.min((Date.now()-startTime)/duration,1); const eased = t<0.5 ? 2*t*t : -1+(4-2*t)*t; camera.position.lerpVectors(startPos, newPos, eased); camera.lookAt(new THREE.Vector3(0,0,0)); if(t<1) requestAnimationFrame(anim); }
            anim();
        }
        function setupControls() {
            document.addEventListener('keydown', e => {
                if (e.key === 'PageDown' || e.key === 'ArrowRight') { nextConcept(); e.preventDefault(); }
                else if (e.key === 'PageUp' || e.key === 'ArrowLeft') { prevConcept(); e.preventDefault(); }
                else if (e.key === 'F5' || e.key.toLowerCase() === 'escape') { if (e.key === 'Escape' && isImmersion) toggleImmersion(); else toggleAutoTour(); e.preventDefault(); }
                else if (e.key === '.') { toggleImmersion(); e.preventDefault(); }
                else if (e.key === ' ' || e.key === 'Enter') { createBurst(2); e.preventDefault(); }
                else if (e.key.toLowerCase() === 'r') resetCamera();
            });
            const cont = document.getElementById('three-container');
            cont.addEventListener('click', e => {
                const rect = cont.getBoundingClientRect(); mouse.x = ((e.clientX-rect.left)/rect.width)*2-1; mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
                raycaster.setFromCamera(mouse, camera); const ints = raycaster.intersectObjects(conceptMeshes);
                if (ints.length > 0) focusOnConcept(conceptMeshes.indexOf(ints[0].object));
            });
        }
        function showEditModal() { const m = document.getElementById('edit-modal'); document.getElementById('json-editor').value = JSON.stringify(concepts, null, 2); m.classList.remove('hidden'); m.classList.add('flex'); }
        function hideEditModal() { const m = document.getElementById('edit-modal'); m.classList.remove('flex'); m.classList.add('hidden'); }
        function applyConceptChanges() {
            try {
                concepts = JSON.parse(document.getElementById('json-editor').value);
                hideEditModal();
                document.getElementById('three-container').innerHTML = '';
                initThreeJS();
                setTimeout(() => focusOnConcept(0), 300);
                const t = document.createElement('div'); t.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-3 rounded-3xl text-sm font-medium'; t.textContent = '✓ Concepts updated!'; document.body.appendChild(t); setTimeout(() => t.remove(), 2200);
            } catch(e) { alert('Invalid JSON'); }
        }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); }
        function initApp() {
            initThreeJS(); setupControls();
            setTimeout(() => { const h = document.createElement('div'); h.className = 'fixed bottom-8 right-8 bg-white/10 text-white/70 text-xs px-4 py-2 rounded-3xl border border-white/10'; h.innerHTML = `Tip: Press <span class="font-mono">F5</span> to start Auto-Tour`; document.body.appendChild(h); setTimeout(() => { h.style.transition='all .4s'; h.style.opacity='0'; setTimeout(()=>h.remove(),400); }, 3800); }, 5200);
            console.log('%c[ConceptForge] R400-ready ✨', 'color:#64748b');
        }
        window.onload = initApp;
    </script>
</body>
</html>
